<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website Under Maintenance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#08090c;
    --text:#ffffff;
    --muted:#9ca3af;
    --accent:#4f7cff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(79,124,255,.12);
    border-radius:50%;
    filter:blur(120px);
    top:-200px;
    left:-150px;
    z-index:0;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(79,124,255,.08);
    border-radius:50%;
    filter:blur(120px);
    bottom:-180px;
    right:-100px;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:24px;
    animation:fadeUp 1s ease;
}

.logo{
    width:260px;
    max-width:85%;
    margin-bottom:28px;
    animation:float 4s ease-in-out infinite;
}

h1{
    font-size:clamp(2rem,6vw,3.5rem);
    font-weight:800;
    letter-spacing:-1px;
    margin-bottom:14px;
}

p{
    max-width:600px;
    margin:auto;
    color:var(--muted);
    line-height:1.8;
    font-size:1rem;
}

.status{
    margin-top:30px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    border-radius:999px;
    background:#11151d;
    border:1px solid rgba(255,255,255,.08);
    color:#b8c4ff;
    font-size:.95rem;
    font-weight:600;
}

.status img{
    width:20px;
    height:20px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 12px var(--accent);
    animation:pulse 2s infinite;
}

.footer{
    margin-top:24px;
    color:#6b7280;
    font-size:.9rem;
}

@keyframes pulse{
    50%{
        transform:scale(1.35);
    }
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:768px){

    .logo{
        width:220px;
    }

    h1{
        font-size:2rem;
    }

    p{
        font-size:.95rem;
    }

    .status{
        font-size:.85rem;
        padding:10px 15px;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="assets/maint.png" alt="Maintenance" class="logo">

    <h1>The Stage is Set</h1>

    <p>
        We're currently making improvements behind the scenes to deliver a better experience.
        Please check back again shortly while maintenance is in progress.
    </p>

    <div class="status">
        <div class="dot"></div>
        <img src="https://img.icons8.com/color/48/maintenance.png" alt="•">
        Website under maintainance
    </div>

    <div class="footer">
        Persian Esports • All rights reserved 
    </div>

</div>

</body>
</html>
